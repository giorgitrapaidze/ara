<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telemetry Recorder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d0d0f;
      color: #e8e8e8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 2rem;
    }

    h1 {
      font-size: 1.4rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #aaa;
    }

    #indicator {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #333;
      display: inline-block;
      margin-right: 8px;
      transition: background 0.3s;
    }
    #indicator.recording { background: #e53e3e; box-shadow: 0 0 8px #e53e3e; animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    #status-text { font-size: 0.9rem; color: #888; }

    .controls { display: flex; gap: 1rem; }

    button {
      padding: 0.75rem 2rem;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.05em;
    }
    button:disabled { opacity: 0.35; cursor: not-allowed; }
    button:not(:disabled):active { transform: scale(0.97); }

    #btn-start    { background: #2f855a; color: #fff; }
    #btn-stop     { background: #c53030; color: #fff; }
    #btn-download { background: #2b6cb0; color: #fff; }

    #topics {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
      width: 420px;
    }

    .topic-card {
      background: #1a1a1f;
      border: 1px solid #2a2a30;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.78rem;
    }

    .topic-card h3 {
      color: #63b3ed;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      margin-bottom: 0.4rem;
      text-transform: uppercase;
    }

    .topic-card .field { display: flex; justify-content: space-between; color: #ccc; }
    .topic-card .val   { color: #f6e05e; font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <h1><span id="indicator"></span>Telemetry Recorder</h1>

  <div class="controls">
    <button id="btn-start">Start</button>
    <button id="btn-stop" disabled>Stop</button>
    <button id="btn-download" disabled>Download .mcap</button>
  </div>

  <div id="topics">
    <div class="topic-card">
      <h3>/car/telemetry</h3>
      <div class="field"><span>Speed</span><span class="val" id="v-speed">—</span></div>
      <div class="field"><span>RPM</span><span class="val" id="v-rpm">—</span></div>
      <div class="field"><span>Gear</span><span class="val" id="v-gear">—</span></div>
      <div class="field"><span>Throttle</span><span class="val" id="v-throttle">—</span></div>
      <div class="field"><span>Brake</span><span class="val" id="v-brake">—</span></div>
    </div>
    <div class="topic-card">
      <h3>/car/imu</h3>
      <div class="field"><span>Lat G</span><span class="val" id="v-latg">—</span></div>
      <div class="field"><span>Lon G</span><span class="val" id="v-long">—</span></div>
      <div class="field"><span>Vert G</span><span class="val" id="v-vertg">—</span></div>
    </div>
    <div class="topic-card">
      <h3>/car/pose</h3>
      <div class="field"><span>X</span><span class="val" id="v-x">—</span></div>
      <div class="field"><span>Y</span><span class="val" id="v-y">—</span></div>
      <div class="field"><span>Heading</span><span class="val" id="v-heading">—</span></div>
    </div>
    <div class="topic-card">
      <h3>/car/inputs</h3>
      <div class="field"><span>Steering</span><span class="val" id="v-steer">—</span></div>
      <div class="field"><span>Throttle</span><span class="val" id="v-inp-throttle">—</span></div>
      <div class="field"><span>Brake</span><span class="val" id="v-inp-brake">—</span></div>
    </div>
  </div>

  <div id="status-text">Idle</div>

  <script>
    const btnStart    = document.getElementById('btn-start');
    const btnStop     = document.getElementById('btn-stop');
    const btnDownload = document.getElementById('btn-download');
    const indicator   = document.getElementById('indicator');
    const statusText  = document.getElementById('status-text');

    let pollInterval = null;

    async function post(url) {
      const r = await fetch(url, { method: 'POST' });
      return r.json();
    }

    btnStart.addEventListener('click', async () => {
      btnStart.disabled = true;
      const res = await post('/start');
      if (res.status === 'recording') {
        btnStop.disabled = false;
        btnDownload.disabled = true;
        indicator.className = 'recording';
        statusText.textContent = 'Recording…';
        pollInterval = setInterval(pollLive, 200);
      } else {
        btnStart.disabled = false;
        statusText.textContent = 'Error: ' + (res.error || 'unknown');
      }
    });

    btnStop.addEventListener('click', async () => {
      btnStop.disabled = true;
      clearInterval(pollInterval);
      const res = await post('/stop');
      if (res.status === 'stopped') {
        btnStart.disabled = false;
        btnDownload.disabled = false;
        indicator.className = '';
        statusText.textContent = 'Stopped — ready to download';
      }
    });

    btnDownload.addEventListener('click', () => {
      window.location.href = '/download';
    });

    // Live data display via a tiny SSE-less poll
    async function pollLive() {
      try {
        const r = await fetch('/live');
        if (!r.ok) return;
        const d = await r.json();
        document.getElementById('v-speed').textContent    = d.telemetry.speed_kmh.toFixed(1) + ' km/h';
        document.getElementById('v-rpm').textContent      = d.telemetry.rpm.toLocaleString();
        document.getElementById('v-gear').textContent     = d.telemetry.gear;
        document.getElementById('v-throttle').textContent = (d.telemetry.throttle * 100).toFixed(0) + '%';
        document.getElementById('v-brake').textContent    = (d.telemetry.brake * 100).toFixed(0) + '%';
        document.getElementById('v-latg').textContent     = d.imu.lat_g.toFixed(2) + ' g';
        document.getElementById('v-long').textContent     = d.imu.lon_g.toFixed(2) + ' g';
        document.getElementById('v-vertg').textContent    = d.imu.vert_g.toFixed(2) + ' g';
        document.getElementById('v-x').textContent        = d.pose.x.toFixed(1) + ' m';
        document.getElementById('v-y').textContent        = d.pose.y.toFixed(1) + ' m';
        document.getElementById('v-heading').textContent  = (d.pose.heading * 180 / Math.PI).toFixed(1) + '°';
        document.getElementById('v-steer').textContent    = d.inputs.steering_angle.toFixed(3);
        document.getElementById('v-inp-throttle').textContent = (d.inputs.throttle * 100).toFixed(0) + '%';
        document.getElementById('v-inp-brake').textContent    = (d.inputs.brake * 100).toFixed(0) + '%';
      } catch (_) {}
    }
  </script>
</body>
</html>
